# ============================================================
#  GitHub Actions — Auto Deploy ke GitHub Pages
#  Trigger: Push ke branch 'main'
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Bisa juga trigger manual dari UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------- JOB 1: Build ----------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify build file
        run: |
          echo "🔍 Memeriksa file build..."
          if [ ! -f "index.html" ]; then
            echo "❌ index.html tidak ditemukan!"
            exit 1
          fi
          echo "✔ File ditemukan: $(du -h index.html | cut -f1)"
          echo "✔ Jumlah baris: $(wc -l < index.html)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  # ---------- JOB 2: Deploy ----------
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deploy info
        run: |
          echo "🚀 Deploy berhasil!"
          echo "📍 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "⏰ Waktu: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
